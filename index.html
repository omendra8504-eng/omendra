<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aapki Website & Login Page</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
            display: flex;
            flex-direction: row;
        }

        /* Baayein Side: Profile Photo aur Naam Section */
        .profile-section {
            background: linear-gradient(180deg, #4f46e5 0%, #3730a3 100%);
            color: white;
            padding: 40px 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .photo-frame {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.8);
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            background-color: #ffffff;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .profile-title {
            font-size: 14px;
            color: #c7d2fe;
            margin-bottom: 20px;
        }

        .profile-bio {
            font-size: 13px;
            line-height: 1.6;
            color: #e0e7ff;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 18px;
            border-radius: 10px;
        }

        /* Daayein Side: Login Form Section */
        .login-section {
            padding: 50px 40px;
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-section h2 {
            color: #1e293b;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .login-section p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        .actions-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #475569;
        }

        .forgot-link {
            color: #4f46e5;
            font-size: 13px;
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-login:hover {
            background-color: #4338ca;
        }

        /* Mobile Screens ke liye Responsiveness */
        @media (max-width: 768px) {
            .main-card {
                flex-direction: column;
            }
            .profile-section, .login-section {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="profile-section">
            <div class="photo-frame">
                <img src="photo.jpg" alt="https://omendra8504-eng.github.io/omendra/">
            </div>
            <div class="profile-name">Omendra</div>
            <div class="profile-title">Website Profile</div>
            <div class="profile-bio">
                Welcome!to this portal.
            </div>
        </div>

        <div class="login-section">
            <h2>Welcome Back! 👋</h2>
            <p>Kripya apna account login karein</p>

            <form action="#" method="POST">
                <div class="form-group">
                    <label for="username">Username / Email</label>
                    <input type="text" id="username" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="actions-row">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login">Login</button>
            </form>
        </div>
    </div>

</body>
</html>
